################
### MONITORS ###
################
# 语法：monitor = 名称, 分辨率@刷新率, X偏移xY偏移, 缩放倍率
# preferred = 自动选取驱动上报的最优分辨率；auto = 自动刷新率/缩放
# mirror,eDP-1 = 把这块屏幕设为 eDP-1 的镜像

monitor=eDP-1,preferred,auto,auto
monitor=HDMI-A-1,preferred,auto,auto,mirror,eDP-1

# xwayland 块：控制 XWayland 兼容层行为
# force_zero_scaling = true：强制 XWayland 应用按 1:1 渲染，再由合成器缩放，
# 避免某些旧应用（如旧版 WPS、腾讯会议）在 HiDPI 下模糊或字体错位
xwayland {
    force_zero_scaling = true
}

# cursor 块：控制光标全局行为
# no_warps = true：切换焦点时光标不会自动"传送"到新窗口中心，保持光标物理位置
cursor {
    no_warps = false
}

#################
### AUTOSTART ###
#################
# exec-once = 命令：仅在 Hyprland 启动时执行一次，hyprctl reload 时不会重复运行

exec-once = dms run                                             # 启动 DMS（DankShell 核心：壁纸/状态栏/IPC 等）
exec-once = sleep 2 && ~/.config/hypr/scripts/monitor-display-policy.sh max-refresh # 启动后将每块活动屏幕切到最高刷新率（优先最高分辨率）
exec-once = ~/.config/hypr/scripts/waypaper-sync-config.sh && waypaper --restore # 同步 waypaper 配置并恢复上次壁纸（触发 DMS 联动）
exec-once = sleep 3 && fcitx5 -d                                # 延迟 3s 启动 fcitx5，等待 portal 完全就绪，
                                                                # 避免输入法在环境变量未加载时启动导致无法输中文
exec-once = xhost +si:localuser:root                            # 允许 root 用户访问 X11 显示，
                                                                # 目的：让需要 root 运行的 GUI 程序（如 gparted）能正常显示
exec-once = [workspace 1 silent] obsidian                       # Obsidian 自启动到 1 号工作区
exec-once = [workspace 2 silent] zen-browser                    # 浏览器自启动到 2 号工作区
exec-once = [workspace 3 silent] Telegram                       # Telegram 自启动到 3 号工作区（可执行名为 Telegram）
exec-once = clash-verge                                         # Clash Verge 
exec-once = [workspace special:magic silent; fullscreen] code   # VS Code 启动到隐藏抽屉并全屏

#############################
### ENVIRONMENT VARIABLES ###
#############################
# 注意：末尾 source = ./dms/cursor.conf 里的 cursor 变量会覆盖这里的值

env = XCURSOR_SIZE,24                  # 传统 X11 光标大小（给 XWayland 应用使用）
env = HYPRCURSOR_SIZE,24               # 新式 Hyprcursor 光标大小（给原生 Wayland 应用使用）
env = QT_QPA_PLATFORMTHEME,gtk3        # 让 Qt5 应用读取 GTK3 主题（按钮/字体/配色统一）
env = QT_QPA_PLATFORMTHEME_QT6,gtk3    # 同上，适用于 Qt6 应用
env = QS_ICON_THEME,Adwaita            # 设置 Quickshell（DMS 状态栏）使用的图标主题
env = XMODIFIERS,@im=fcitx             # 告知 X11 程序使用 fcitx 作为输入法框架
env = QT_IM_MODULES,fcitx              # 告知 Qt 程序通过 fcitx 模块处理输入
env = LANGUAGE,zh_CN.UTF-8             # 优先语言列表（影响程序菜单/提示语言）
env = LANG,zh_CN.UTF-8                 # 全局 locale（决定日期格式、排序、语言）
env = LC_CTYPE,en_US.UTF-8             # 单独覆盖字符分类 locale 为英文 UTF-8，
                                       # 避免某些程序在纯中文 locale 下出现编码问题

#####################
### LOOK AND FEEL ###
#####################

$color1 = rgba(33ccffee)    # 自定义颜色变量，可在其他地方引用

general {
    gaps_in  = 3             # 相邻窗口之间的间距（像素）
    gaps_out = 5             # 窗口距屏幕边缘的间距（像素）
    border_size = 0          # 窗口边框宽度（像素），0 表示无边框

    # 边框颜色，rgba(RRGGBBAA) 格式，45deg 表示渐变角度
    # 注意：末尾 source = ./dms/colors.conf 会覆盖下面两行
    col.active_border   = rgba(00ff99ee) 45deg   # 当前聚焦窗口边框颜色
    col.inactive_border = rgba(595959aa)          # 未聚焦窗口边框颜色

    resize_on_border  = false   # 拖拽边框/间隙时不触发缩放（true = 可拖边框调整窗口大小）
    allow_tearing     = false   # 禁止画面撕裂（开启可减少游戏延迟，但有视觉瑕疵）
    layout            = scrolling  # 全局布局：scrolling / dwindle / master
    no_focus_fallback = true    # 焦点到达边缘时不环绕跳到对面窗口
}

decoration {
    rounding       = 8    # 窗口圆角半径（像素）
    rounding_power = 2    # 圆角平滑算法幂次：2.0 = 标准圆

    active_opacity   = 0.9   # 当前聚焦窗口不透明度（1.0 = 完全不透明）
    inactive_opacity = 0.8   # 未聚焦窗口不透明度

    shadow {
        enabled      = true
        range        = 3               # 阴影扩散半径（像素）
        render_power = 1               # 阴影衰减强度（1-4），值越大阴影越实
        color        = rgba(1a1a1aee)  # 阴影颜色（深灰色，透明度 ee ≈ 93%）
    }

    blur {
        enabled  = true
        # xray = on：X光模式，浮动窗口直接透过采样底层壁纸模糊，
        # 而非叠加采样下方所有窗口（后者 GPU 开销远更大）
        xray     = on
        size     = 1      # 模糊采样半径，值越大模糊范围越宽
        passes   = 0      # 模糊迭代次数，次数越多越细腻但开销线性增加
        noise    = 0.02   # 加入轻微噪点，避免模糊区域过于"塑料感"
        vibrancy = 0.2    # 提升模糊背景色彩饱和度（0 = 不增强，1 = 最大）
        contrast = 1.0    # 提升模糊背景对比度（1.0 = 原始）
    }
}

animations {
    enabled = yes, please :)   # Hyprland 只检查第一个词 yes/no

    # 贝塞尔曲线：定义动画速度随时间的变化（缓动函数）
    # 语法：bezier = 名称, P1x, P1y, P2x, P2y（三次贝塞尔控制点）
    # 可在 https://cubic-bezier.com 可视化预览
    bezier = easeOutQuint,   0.23, 1,    0.32, 1     # 快速减速，适合窗口弹出感
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1     # 先慢后快再慢，适合平滑过渡
    bezier = linear,         0,    0,    1,    1      # 匀速，适合淡出等线性动画
    bezier = almostLinear,   0.5,  0.5,  0.75, 1     # 接近匀速但末尾略微减速
    bezier = quick,          0.15, 0,    0.1,  1     # 极速启动、快速完成
    bezier = overshot,       0.18, 0.95, 0.22, 1.03  # 末尾轻微超出再弹回（弹性感）

    # 动画配置
    # 语法：animation = 名称, 开关(1/0), 速度, 曲线, [风格]
    # 速度以 100ms 为基准，速度=5 ≈ 0.5s，数值越大越慢
    animation = global,        1, 10,   default                  # 全局默认（其他未覆盖的走这里）
    animation = border,        1, 5.39, easeOutQuint             # 边框颜色切换
    animation = windows,       1, 4.79, easeOutQuint             # 窗口移动/缩放通用
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%  # 窗口打开：从 87% 弹出
    animation = windowsOut,    1, 1.49, linear,       popin 87%  # 窗口关闭：快速缩回 87%
    animation = fadeIn,        1, 1.73, almostLinear             # 窗口淡入
    animation = fadeOut,       1, 1.46, almostLinear             # 窗口淡出
    animation = fade,          1, 3.03, quick                    # 通用淡入淡出（如失焦变暗）
    animation = layers,        1, 3.81, easeOutQuint             # 图层（Waybar/通知）通用
    animation = layersIn,      1, 4,    easeOutQuint, fade       # 图层出现：淡入
    animation = layersOut,     1, 1.5,  linear,       fade       # 图层消失：线性淡出
    animation = fadeLayersIn,  1, 1.79, almostLinear             # 图层淡入透明度
    animation = fadeLayersOut, 1, 1.39, almostLinear             # 图层淡出透明度
    animation = workspaces,    1, 4.5,  overshot, slidevert      # 切换工作区：垂直滑动+弹性
    animation = zoomFactor,    1, 7,    quick                    # 概览缩放（fake-overview 用）
}

###############
### LAYOUTS ###
###############

# Smart Gaps（仅一个窗口时去除间距），需要时取消注释
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0

# dwindle 布局（layout = dwindle 时生效）：螺旋分割
dwindle {
    pseudotile    = true   # 伪平铺：让"浮动"窗口保持平铺位置约束，Super+P 切换
    preserve_split = true  # 调整窗口大小时不影响相邻窗口的分割比例
}

# master 布局（layout = master 时生效）：主从布局
master {
    new_status = master    # 新窗口默认成为主窗口（占据主区域），另选：slave
}

# scrolling 布局（当前主力布局）
# 原理：窗口横向排列成"列"，每列可纵向堆叠多个窗口，像电影胶片横向延伸
scrolling {
    fullscreen_on_one_column = true                     # 一列中只有一个窗口时自动撑满整个屏幕
    column_width             = 0.667                    # 新列默认全宽，避免新开窗口时把现有窗口挤占变窄
    explicit_column_widths   = 0.333, 0.5, 0.667, 1.0   # Super+R 循环切换的列宽预设（1/3、1/2、2/3、1/1）
    direction                = right                    # 新窗口出现在当前焦点窗口的右侧
}

misc {
    force_default_wallpaper = 0     # 内置壁纸：-1=随机动漫壁纸，0/1=固定图
    disable_hyprland_logo   = false # false=保留启动时 Hyprland Logo 动漫背景
}

#############
### INPUT ###
#############

input {
    kb_layout  = us   # 键盘布局：us = 美式英语标准布局
    kb_variant =      # 布局变体（留空=默认），如 dvorak、colemak
    kb_model   =      # 键盘型号（通常留空）
    kb_options =      # 附加选项（如 caps:swapescape 交换 Caps 和 Esc）
    kb_rules   =      # XKB 规则文件（通常留空）

    # follow_mouse：焦点跟随鼠标方式
    # 0 = 点击才切换  1 = 移入即切换  2 = 同1但空白区域不失焦  3 = 同0但保持鼠标附近窗口前台
    follow_mouse  = 1
    accel_profile = flat  # 鼠标加速曲线：flat = 完全线性（禁用系统加速）
    sensitivity   = 0     # 灵敏度增益（-1.0 到 1.0），0 = 不修改原始移动量

    touchpad {
        natural_scroll = true   # 自然滚动：手指向下 = 内容向下（跟手）
    }
}

# 多指手势（Hyprland 原生支持）
# 语法：gesture = 手指数, 方向, dispatcher, [参数...]
gesture = 3, vertical, workspace             # 三指上下：切换工作区
gesture = 3, right, dispatcher, movefocus, l # 三指右划：焦点移到左边窗口
gesture = 3, left,  dispatcher, movefocus, r # 三指左划：焦点移到右边窗口

# 针对特定设备单独配置（真实设备名用 hyprctl devices 查看）
device {
    name        = epic-mouse-v1
    sensitivity = -0.5    # 该设备专属灵敏度，覆盖全局设置
}
