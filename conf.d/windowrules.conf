##############################
### WINDOWS AND WORKSPACES ###
##############################
# 窗口规则（新式 windowrule 块语法，Hyprland 0.41+ 引入）
# 原理：每个 windowrule 块是"一组匹配条件 + 一组生效效果"
# match:xxx = 匹配条件，所有 match 必须同时满足才应用效果，支持正则表达式
# 规则从上到下顺序匹配，多条规则可同时生效（非排他）

# 全局屏蔽最大化请求
# 原因：平铺 WM 下"最大化"由布局引擎控制，允许应用自请求最大化会破坏布局
windowrule {
    name = suppress-maximize-events
    match:class    = .*          # .* = 匹配任意 class，全局生效
    suppress_event = maximize    # 拦截 maximize 事件，不传递给布局引擎
}

# 修复 XWayland 拖拽幽灵窗口 bug
# 特征：class 和 title 都为空，是 XWayland 浮动、非全屏、非固定的窗口
windowrule {
    name = fix-xwayland-drags
    match:class      = ^$         # class 为空字符串
    match:title      = ^$         # title 为空字符串
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true               # 不让幽灵窗口获得焦点，防止干扰正常操作
}

# hyprland-run 弹出窗口：固定在屏幕左下角
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120   # 距左边 20px，距屏幕底部 120px（monitor_h = 屏幕高度）
    float = yes
}

# 按 class 强制浮动（用 | 分隔多个 class，^(...)$ 完全匹配其中任一）
windowrule {
    name = float-by-class
    match:class = ^(|com\.gabm\.satty|hyprland-share-picker|org\.quickshell|imv|media_info|video2gif|floating-term|nm-connection-editor|blueman-manager|com\.github\.hluk\.copyq|be\.alexandervanhee\.gradia|org\.pulseaudio\.pavucontrol|org\.gnome\.clocks|org\.gnome\.FileRoller|btrfs-assistant|SPlayer|QQ|xdg-desktop-portal-gtk|clash-verge|nwg-look)$
    # com.gabm.satty            = satty 截图注释工具
    # hyprland-share-picker     = Hyprland 屏幕共享选择器
    # org.quickshell            = Quickshell（DMS 状态栏框架）
    # imv                       = 轻量图片查看器
    # nm-connection-editor      = NetworkManager 网络配置编辑器
    # blueman-manager           = 蓝牙设备管理器
    # com.github.hluk.copyq     = CopyQ 剪贴板管理器
    # org.pulseaudio.pavucontrol = PulseAudio 音量控制面板
    # org.gnome.FileRoller      = GNOME 归档管理器
    # btrfs-assistant           = Btrfs 快照图形界面
    # SPlayer                   = SPlayer 播放器窗口
    # QQ                        = QQ 主窗口
    # xdg-desktop-portal-gtk    = GTK 文件选择器（打开文件/打开文件夹）
    # clash-verge               = Clash Verge 客户端
    # nwg-look                  = GTK 主题配置工具
    float = on
}

# 按 title 强制浮动（中文标题对话框）
windowrule {
    name = float-by-title
    match:title = ^(文件操作进度|群聊的聊天记录|聊天记录|日历|重命名|Steam 设置|另存为|图片查看器|图片与视频)$
    float = on
}

# 快速浮动终端：Super+/ 唤出，配合 keybindings.conf 中的 --class=quickterminal
windowrule {
    name = quickterminal
    match:class = quickterminal
    float = yes
}

# 微信渲染修复：微信在 Hyprland 下开启模糊/阴影常导致黑框或卡顿
windowrule {
    name = wechat
    match:class = wechat
    no_blur     = true    # 禁用背景模糊（解决黑框）
    no_shadow   = true    # 禁用阴影（减少渲染错误）
    border_size = 0       # 去除边框（视觉更干净）
}

# 浮动窗口关闭 xray 模糊穿透
# 原因：xray=on 时若底层有其他平铺窗口，浮动窗口背景会显示错误内容
# 解决：浮动窗口改用 xray=off，正确采样它下方的所有窗口内容来模糊
windowrule {
    name = optimize-tiled-blur
    match:float = true
    xray = off
}
