###################
### KEYBINDINGS ###
###################
# bind 语法：bind = 修饰键, 按键, dispatcher, [参数]
# 修饰键可叠加：SUPER SHIFT CTRL ALT
# 特殊标志（写在第一个逗号前）：
#   e = 按住重复触发（音量/亮度等连续调节）
#   l = 锁屏状态下也生效（多媒体键）
#   m = 鼠标按键绑定（bindm）

###################
### MY PROGRAMS ###
###################

# 用 $ 变量统一管理常用程序，方便后续 bind 直接引用；改程序只需改这里

$terminal    = kitty
$fileManager = thunar
$menu        = dms ipc call launcher toggle       
$browser     = zen-browser
$clipboard   = dms ipc call clipboard toggle
$mainMod     = SUPER

# ---- 布局实时切换（hyprctl keyword 动态修改，无需 reload）----

bind = $mainMod SHIFT, 1, exec, hyprctl keyword general:layout scrolling  # → scrolling 布局
bind = $mainMod SHIFT, 2, exec, hyprctl keyword general:layout dwindle    # → dwindle 布局

# ---- 特殊功能 ----
# pkill fcitx5 = 在运行则杀死；|| fcitx5 = 否则启动（toggle 效果）

bind = $mainMod, F1, exec, pkill fcitx5 || fcitx5
bind = $mainMod, F2, exec, obs-cli recording start
bind = $mainMod, F5, exec, obs                                      # 启动 OBS
bind = $mainMod, F7, exec, quicksave                                # 快速存档
bind = $mainMod, F8, exec, quickload                                # 快速读档

# 虚假概览 overview：临时切换成 dwindle 布局让所有窗口可见，聚焦后自动恢复原布局
bind = $mainMod, G, exec, ~/.config/hypr/scripts/fake-overview.sh

# ---- Scrolling 布局专用操作 ----
# colresize +conf：在 explicit_column_widths 预设值中循环切换列宽

bind = $mainMod, R, layoutmsg, colresize +conf

# ---- 焦点移动 ----

bind = $mainMod, mouse_down, layoutmsg, focus left                  # 鼠标切换右焦点
bind = $mainMod, mouse_up,   layoutmsg, focus right                 # 鼠标切换左焦点
bind = $mainMod, left,  movefocus, l                                # 切换到左窗口
bind = $mainMod, right, movefocus, r                                # 切换到右窗口
bind = $mainMod, up,    workspace, -1                               # 切换到上一个工作区
bind = $mainMod, down,  workspace, +1                               # 切换到下一个工作区

# ---- 窗口大小 / 全屏 ----

bind = $mainMod,       F, layoutmsg, colresize 1                    # colresize 1 = 把当前列宽撑到 100% 
bind = $mainMod SHIFT, F, fullscreen                                # 全屏

# ---- 工作区切换&移动----

bind = $mainMod SHIFT, mouse_down,          workspace,-1            # 切换到上一个工作区
bind = $mainMod SHIFT, mouse_up,            workspace,+1            # 切换到下一个工作区 
bind = $mainMod Alt,   left, layoutmsg,     swapcol l               # 把当前列与右列交换位置
bind = $mainMod Alt,   right, layoutmsg,    swapcol r               # 把当前列与左列交换位置
bind = $mainMod Alt,   mouse_down,          movetoworkspace, -1     # 把当前窗口移到上一个工作区
bind = $mainMod Alt,   mouse_up,            movetoworkspace, +1     # 把当前窗口移到下一个工作区
bind = $mainMod Alt,   up,                  movetoworkspace, -1     # 把当前窗口移到上一个工作区
bind = $mainMod Alt,   down,                movetoworkspace, +1     # 把当前窗口移到下一个工作区

# ---- 常用程序 ----
bind = $mainMod,      T,     exec, ~/.config/hypr/scripts/focus-or-launch.sh qq         # 启动或唤醒 QQ
bind = $mainMod,      M,     exec, /opt/SPlayer/SPlayer                                 # SPlayer
bind = $mainMod,      C,     exec, ~/.config/hypr/scripts/focus-or-launch.sh obsidian   # 启动或唤醒 Obsidian
bind = $mainMod,      V,     exec, code                                                 # vscode
bind = $mainMod,      W,     exec, ~/.config/hypr/scripts/focus-or-launch.sh browser    # 启动或唤醒浏览器
bind = $mainMod,      Y,     exec, ~/.config/hypr/scripts/focus-or-launch.sh telegram   # 启动或唤醒 Telegram
bind = $mainMod,      B,     exec, ~/.config/hypr/scripts/focus-or-launch.sh clash      # 启动或唤醒 Clash Verge
bind = $mainMod, Return,     exec, $terminal                        # 终端
bind = $mainMod,      Q,     killactive,                            # 优雅关闭当前聚焦窗口
bind = $mainMod,SUPER_L,     exec, dms ipc call launcher toggle     # ＤＭＳ软件启动器
bind = $mainMod,      E,     exec, $fileManager                     # 文件管理器
bind = $mainMod Ctrl, V,     exec, $clipboard                       # 剪贴板
bind = $mainMod Ctrl, W,     exec, waypaper                         # 壁纸选择器（Waypaper）
bind = CTRL ALT,      Delete, exec, dms ipc call powermenu toggle   # DMS 电源菜单

# 快速浮动终端：--single-instance 复用 kitty 进程，--class 配合 windowrule 强制浮动
bind = $mainMod, Slash, exec, $terminal --single-instance --class=quickterminal

# ---- 截图（需要 grim + slurp）----
# grim -g "$(slurp)"：slurp 选区后截图，- 表示输出到 stdout

bind = $mainMod SHIFT, A, exec, grim -g "$(slurp)" - | wl-copy      # 截图 → 复制到剪贴板
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | satty -f -   # 截图 → satty 注释编辑

# 退出 Hyprland（优先调用 hyprshutdown，不存在则 fallback 到 hyprctl dispatch exit）
# bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ---- 窗口状态 ----
bind = $mainMod Alt, V, togglefloating,                             # 平铺 ↔ 浮动 切换

# ---- 工作区跳转（数字键，0 = 第 10 个）----
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ---- 窗口移动到指定工作区（焦点不跟随）----
bind = $mainMod Alt, 1, movetoworkspace, 1
bind = $mainMod Alt, 2, movetoworkspace, 2
bind = $mainMod Alt, 3, movetoworkspace, 3
bind = $mainMod Alt, 4, movetoworkspace, 4
bind = $mainMod Alt, 5, movetoworkspace, 5
bind = $mainMod Alt, 6, movetoworkspace, 6
bind = $mainMod Alt, 7, movetoworkspace, 7
bind = $mainMod Alt, 8, movetoworkspace, 8
bind = $mainMod Alt, 9, movetoworkspace, 9
bind = $mainMod Alt, 0, movetoworkspace, 10

    # ---- Scratchpad（隐藏的抽屉工作区）----
# togglespecialworkspace：显示/隐藏；movetoworkspace special:xxx：送入其中
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic

# ---- 鼠标拖拽 ----
# mouse:272 = 左键，mouse:273 = 右键
bindm = $mainMod, mouse:272, movewindow                         # Super+左键拖拽：移动窗口
bindm = $mainMod, mouse:273, resizewindow                       # Super+右键拖拽：缩放窗口

# 调整窗口宽度 (binde 允许按住不放持续触发)
# resizeactive 的参数是 "X方向像素 Y方向像素"
binde = SUPER CTRL, left, resizeactive, -50 0                   # Super+Ctrl+左方向键：向左收缩 (X轴减小像素)
binde = SUPER CTRL, right, resizeactive, 50 0                   # Super+Ctrl+右方向键：向右扩展 (X轴增加像素)

# ---- 笔记本功能键 ----
# bindel = 带 e 标志（按住重复），适合音量/亮度连续调节
# wpctl：PipeWire 音频控制；set-volume -l 1 限制上限为 100%
bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# brightnessctl -e4：平滑调节；-n2：最低不低于 2% 防止屏幕全黑
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ---- 合盖/开盖自动切屏策略 ----
# 合盖：若检测到外屏，则仅保留外屏（关闭内屏）
# 开盖：若检测到外屏，则恢复双屏镜像（HDMI 主屏）；无外屏则仅内屏
bindl = , switch:on:Lid Switch,  exec, ~/.config/hypr/scripts/monitor-display-policy.sh lid-close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/monitor-display-policy.sh lid-open

# ---- 媒体播放控制 ----
# Super+Shift+P / > / <  -> 暂停/下一首/上一首（>/ < 对应 period/comma + Shift）
bind = $mainMod SHIFT, P,      exec, playerctl play-pause
bind = $mainMod SHIFT, period, exec, playerctl next
bind = $mainMod SHIFT, comma,  exec, playerctl previous
