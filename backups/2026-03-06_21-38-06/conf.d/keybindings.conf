###################
### KEYBINDINGS ###
###################
# bind 语法：bind = 修饰键, 按键, dispatcher, [参数]
# 修饰键可叠加：SUPER SHIFT CTRL ALT
# 常用 dispatcher：exec / workspace / movetoworkspace /
#                  movefocus / movewindow / togglefloating / fullscreen / killactive
# 特殊标志（写在第一个逗号前）：
#   e = 按住重复触发（音量/亮度等连续调节）
#   l = 锁屏状态下也生效（多媒体键）
#   m = 鼠标按键绑定（bindm）

###################
### MY PROGRAMS ###
###################
# 用 $ 变量统一管理常用程序，方便后续 bind 直接引用；改程序只需改这里
$terminal    = kitty
$fileManager = thunar
$menu        = dms ipc call launcher toggle       # 通过 DMS IPC 调用启动器（显示/隐藏切换）
$browser     = zen-browser
$clipboard   = dms ipc call clipboard toggle      # 通过 DMS IPC 调用剪贴板管理（显示/隐藏）
$mainMod     = SUPER                              # 主修饰键 = Win 键

# ---- 布局实时切换（hyprctl keyword 动态修改，无需 reload）----
bind = $mainMod SHIFT, 1, exec, hyprctl keyword general:layout scrolling  # → scrolling 布局
bind = $mainMod SHIFT, 2, exec, hyprctl keyword general:layout dwindle    # → dwindle 布局

# ---- 特殊功能 ----
# pkill fcitx5 = 在运行则杀死；|| fcitx5 = 否则启动（toggle 效果）
bind = $mainMod, F1, exec, pkill fcitx5 || fcitx5
bind = $mainMod, F3, exec, ~/.local/bin/wf-recorder-menu    # 录屏菜单
bind = $mainMod, F5, exec, quicksave                        # 快速存档
bind = $mainMod, F8, exec, quickload                        # 快速读档

# 虚假概览 overview：临时切换成 dwindle 布局让所有窗口可见，聚焦后自动恢复原布局
bind = $mainMod, G, exec, ~/.config/hypr/scripts/fake-overview.sh

# ---- Scrolling 布局专用操作 ----
# colresize +conf：在 explicit_column_widths 预设值中循环切换列宽
bind = $mainMod, R, layoutmsg, colresize +conf

# promote：将当前窗口从所在列中提取出来，独立成一个新列
# bind = $mainMod, N, layoutmsg, promote

# 滚轮切换列焦点
bind = $mainMod, mouse_down, layoutmsg, focus left
bind = $mainMod, mouse_up,   layoutmsg, focus right

# 把当前列与左/右列交换位置
bind = $mainMod Ctrl, H, layoutmsg, swapcol l
bind = $mainMod Ctrl, L, layoutmsg, swapcol r

# ---- 窗口大小 / 全屏 ----
# colresize 1 = 把当前列宽撑到 100% 屏幕宽（视觉最大化）
bind = $mainMod,       F, layoutmsg, colresize 1
bind = $mainMod SHIFT, F, fullscreen     # 真正全屏（无边框，占满整屏）

# ---- 工作区切换（滚轮）----
bind = $mainMod SHIFT, mouse_down, workspace,      -1   # 切换到上一个工作区
bind = $mainMod SHIFT, mouse_up,   workspace,      +1   # 切换到下一个工作区 
bind = $mainMod Alt,   mouse_down, movetoworkspace, -1  # 把当前窗口移到上一个工作区
bind = $mainMod Alt,   mouse_up,   movetoworkspace, +1  # 把当前窗口移到下一个工作区

# ---- 常用程序 ----
bind = $mainMod,      W,     exec, $browser
bind = $mainMod,      T,     exec, $terminal
bind = $mainMod,      Q,     killactive,             # 关闭当前聚焦窗口
bind = SUPER, {}, exec, dms ipc call launcher toggle
bind = $mainMod,      E,     exec, $fileManager
bind = $mainMod Ctrl, V,     exec, $clipboardd
bind = $mainMod Ctrl, W,     exec, dms ipc call dankdash wallpaper  # 壁纸选择器
# 快速浮动终端：--single-instance 复用 kitty 进程，--class 配合 windowrule 强制浮动
bind = $mainMod, Slash, exec, $terminal --single-instance --class=quickterminal

# ---- 截图（需要 grim + slurp）----
# grim -g "$(slurp)"：slurp 选区后截图，- 表示输出到 stdout
bind = $mainMod SHIFT, A, exec, grim -g "$(slurp)" - | wl-copy    # 截图 → 复制到剪贴板
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | satty -f - # 截图 → satty 注释编辑

# 退出 Hyprland（优先调用 hyprshutdown，不存在则 fallback 到 hyprctl dispatch exit）
# bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ---- 窗口状态 ----
bind = $mainMod Alt, V, togglefloating,   # 平铺 ↔ 浮动 切换

# ---- 焦点移动 ----
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    workspace, -1   # 改为：切换到上一个工作区
bind = $mainMod, down,  workspace, +1   # 改为：切换到下一个工作区

# ---- 工作区跳转（数字键，0 = 第 10 个）----
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ---- 窗口移动到指定工作区（焦点不跟随）----
bind = $mainMod Alt, 1, movetoworkspace, 1
bind = $mainMod Alt, 2, movetoworkspace, 2
bind = $mainMod Alt, 3, movetoworkspace, 3
bind = $mainMod Alt, 4, movetoworkspace, 4
bind = $mainMod Alt, 5, movetoworkspace, 5
bind = $mainMod Alt, 6, movetoworkspace, 6
bind = $mainMod Alt, 7, movetoworkspace, 7
bind = $mainMod Alt, 8, movetoworkspace, 8
bind = $mainMod Alt, 9, movetoworkspace, 9
bind = $mainMod Alt, 0, movetoworkspace, 10

# ---- Scratchpad（隐藏的抽屉工作区）----
# togglespecialworkspace：显示/隐藏；movetoworkspace special:xxx：送入其中
bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ---- 鼠标拖拽 ----
# mouse:272 = 左键，mouse:273 = 右键
bindm = $mainMod, mouse:272, movewindow    # Super+左键拖拽：移动窗口
bindm = $mainMod, mouse:273, resizewindow  # Super+右键拖拽：缩放窗口

# ---- 笔记本功能键 ----
# bindel = 带 e 标志（按住重复），适合音量/亮度连续调节
# wpctl：PipeWire 音频控制；set-volume -l 1 限制上限为 100%
bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# brightnessctl -e4：平滑调节；-n2：最低不低于 2% 防止屏幕全黑
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ---- 媒体播放控制（bindl：锁屏状态下也有效）----
# playerctl：统一控制当前播放中的媒体程序（Spotify/网易云/浏览器等）
bindl = ,XF86AudioNext,  exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay,  exec, playerctl play-pause
bindl = ,XF86AudioPrev,  exec, playerctl previous
